[versions]
agp = "8.7.3"
kotlin = "2.0.21"

[libraries]
# No libraries — the app uses only the Android framework and the Kotlin stdlib
# (added automatically by the Kotlin plugin). No AndroidX at all.

[plugins]
android-application = { id = "com.android.application", version.ref = "agp" }
kotlin-android = { id = "org.jetbrains.kotlin.android", version.ref = "kotlin" }

[versions]
agp = "8.7.3"
kotlin = "2.0.21"
junit = "4.13.2"

[libraries]
# The app itself uses only the Android framework and the Kotlin stdlib (added
# automatically by the Kotlin plugin) — no AndroidX at all. JUnit below is
# testImplementation only: it runs on the JVM and never enters the APK.
junit = { group = "junit", name = "junit", version.ref = "junit" }

[plugins]
android-application = { id = "com.android.application", version.ref = "agp" }
kotlin-android = { id = "org.jetbrains.kotlin.android", version.ref = "kotlin" }
